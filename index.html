<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepuAgent — Smart Link France</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;0,900;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf7; --surface: #ffffff; --ink: #18181b; --muted: #71717a;
    --border: #e4e4e7; --g: #16a34a; --g-light: #dcfce7; --y: #ca8a04;
    --y-light: #fef9c3; --r: #dc2626; --r-light: #fee2e2; --accent: #2563eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'DM Mono',monospace; min-height:100vh; display:flex; flex-direction:column; }
  .topbar { background:var(--ink); color:#fff; padding:14px 28px; display:flex; align-items:center; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-logo { width:32px; height:32px; background:#16a34a; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .brand-name { font-family:'Fraunces',serif; font-size:17px; font-weight:700; }
  .brand-name span { color:#4ade80; }
  .topbar-tag { font-size:10px; letter-spacing:2px; color:#52525b; text-transform:uppercase; }
  .main { flex:1; display:grid; grid-template-columns:1fr 1fr; max-width:1100px; width:100%; margin:0 auto; }
  @media(max-width:720px) { .main { grid-template-columns:1fr; } }
  .panel { padding:32px 28px; }
  .panel-left { border-right:1px solid var(--border); }
  .panel-right { background:var(--surface); }
  .panel-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:22px; }
  .field { margin-bottom:18px; }
  label { display:block; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  input[type="text"], textarea, select { width:100%; background:var(--surface); border:1.5px solid var(--border); color:var(--ink); font-family:'DM Mono',monospace; font-size:12px; padding:10px 12px; outline:none; transition:border-color .2s; border-radius:4px; -webkit-appearance:none; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:100px; line-height:1.6; }
  .config-toggle { font-size:10px; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:16px; user-select:none; }
  .config-panel { background:#f4f4f5; border:1px solid var(--border); border-radius:4px; padding:16px; margin-bottom:18px; display:none; }
  .config-panel.open { display:block; }
  .divider { height:1px; background:var(--border); margin:18px 0; }
  .stars-row { display:flex; gap:6px; margin-bottom:6px; }
  .star-btn { font-size:26px; cursor:pointer; background:none; border:none; line-height:1; transition:transform .15s; filter:grayscale(1) opacity(.35); }
  .star-btn:hover, .star-btn.active { filter:none; transform:scale(1.15); }
  .rating-label { font-size:10px; color:var(--muted); height:18px; }
  .btn-generate { width:100%; padding:14px; background:var(--ink); color:#fff; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; letter-spacing:1px; border:none; cursor:pointer; border-radius:4px; transition:background .2s,transform .1s; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px; }
  .btn-generate:hover:not(:disabled) { background:#27272a; }
  .btn-generate:disabled { opacity:.5; cursor:not-allowed; }
  .spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
  .btn-generate.loading .spinner { display:block; }
  .btn-generate.loading .btn-text { display:none; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .result-empty { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--muted); padding:40px; text-align:center; }
  .result-empty-icon { font-size:44px; opacity:.4; }
  .result-empty-text { font-size:11px; line-height:1.7; max-width:240px; }
  .result-box { display:none; flex-direction:column; }
  .result-box.visible { display:flex; }
  .tone-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:10px; font-weight:500; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; width:fit-content; }
  .tone-positive { background:var(--g-light); color:var(--g); }
  .tone-neutral { background:var(--y-light); color:var(--y); }
  .tone-negative { background:var(--r-light); color:var(--r); }
  .result-text { flex:1; font-size:13px; line-height:1.9; color:var(--ink); white-space:pre-wrap; background:#fafaf7; border:1.5px solid var(--border); border-radius:4px; padding:18px; min-height:140px; }
  .char-count { font-size:10px; color:var(--muted); text-align:right; margin-top:8px; }
  .result-actions { display:flex; gap:10px; margin-top:16px; }
  .btn-copy, .btn-regen { flex:1; padding:11px; font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; border-radius:4px; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px; font-weight:500; }
  .btn-copy { background:var(--ink); color:#fff; border:none; }
  .btn-copy:hover { background:#27272a; }
  .btn-copy.copied { background:var(--g); }
  .btn-regen { background:transparent; color:var(--muted); border:1.5px solid var(--border); }
  .btn-regen:hover { border-color:var(--ink); color:var(--ink); }
  .history-section { max-width:1100px; margin:0 auto; width:100%; border-top:1px solid var(--border); padding:28px; }
  .history-title { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:16px; }
  .history-list { display:flex; flex-direction:column; gap:8px; }
  .history-item { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:12px 16px; display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:start; }
  .h-stars { font-size:12px; white-space:nowrap; }
  .h-preview { font-size:11px; color:var(--muted); line-height:1.5; }
  .h-preview strong { color:var(--ink); display:block; margin-bottom:2px; font-size:11px; }
  .h-copy { font-size:10px; background:none; border:1px solid var(--border); color:var(--muted); padding:4px 10px; cursor:pointer; border-radius:3px; font-family:'DM Mono',monospace; white-space:nowrap; transition:all .15s; }
  .h-copy:hover { border-color:var(--ink); color:var(--ink); }
  .error-banner { background:var(--r-light); border:1px solid #fca5a5; color:var(--r); font-size:11px; padding:10px 14px; border-radius:4px; margin-top:10px; display:none; line-height:1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-logo">⭐</div>
    <div class="brand-name">Smart Link <span>France</span></div>
  </div>
  <div class="topbar-tag">Agent IA · Réponses Avis Google</div>
</div>

<div class="main">
  <div class="panel panel-left">
    <div class="panel-title">📝 Paramètres</div>
    <div class="config-toggle" onclick="toggleConfig()">
      <span id="config-arrow">▶</span> Infos du commerce
    </div>
    <div class="config-panel" id="config-panel">
      <div class="field">
        <label>Nom du commerce</label>
        <input type="text" id="commerce-name" placeholder="Ex: Salon Élégance">
      </div>
      <div class="field">
        <label>Type d'activité</label>
        <input type="text" id="commerce-type" placeholder="coiffeur, restaurant…">
      </div>
      <div class="field">
        <label>Ville</label>
        <input type="text" id="commerce-city" placeholder="Paris 15e, Lyon…">
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Ton</label>
        <select id="tone-select">
          <option value="chaleureux">Chaleureux & proche</option>
          <option value="professionnel">Professionnel</option>
          <option value="dynamique">Dynamique</option>
        </select>
      </div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label>Note de l'avis</label>
      <div class="stars-row">
        <button class="star-btn" onclick="setRating(1)">⭐</button>
        <button class="star-btn" onclick="setRating(2)">⭐</button>
        <button class="star-btn" onclick="setRating(3)">⭐</button>
        <button class="star-btn" onclick="setRating(4)">⭐</button>
        <button class="star-btn" onclick="setRating(5)">⭐</button>
      </div>
      <div class="rating-label" id="rating-label">Clique sur une étoile</div>
    </div>
    <div class="field">
      <label>Prénom du client</label>
      <input type="text" id="reviewer-name" placeholder="Sophie, Marc… (optionnel)">
    </div>
    <div class="field">
      <label>Texte de l'avis</label>
      <textarea id="review-text" placeholder="Colle ici le texte de l'avis Google…"></textarea>
    </div>
    <button class="btn-generate" id="gen-btn" onclick="generateReply()">
      <div class="spinner"></div>
      <span class="btn-text">✨ Générer la réponse</span>
    </button>
    <div class="error-banner" id="error-msg"></div>
  </div>

  <div class="panel panel-right">
    <div class="panel-title">🤖 Réponse générée</div>
    <div class="result-empty" id="result-empty">
      <div class="result-empty-icon">💬</div>
      <div class="result-empty-text">Remplis les infos à gauche et clique sur "Générer" pour obtenir une réponse professionnelle.</div>
    </div>
    <div class="result-box" id="result-box">
      <div class="tone-badge" id="tone-badge"></div>
      <div class="result-text" id="result-text"></div>
      <div class="char-count" id="char-count"></div>
      <div class="result-actions">
        <button class="btn-copy" id="btn-copy" onclick="copyReply()">📋 Copier</button>
        <button class="btn-regen" onclick="generateReply()">🔄 Regénérer</button>
      </div>
    </div>
  </div>
</div>

<div class="history-section" id="history-section" style="display:none">
  <div class="history-title">Historique de session</div>
  <div class="history-list" id="history-list"></div>
</div>

<script>
  let currentRating = 0;
  let sessionHistory = [];

  const ratingLabels = { 1:'😡 Très négatif', 2:'😕 Négatif', 3:'😐 Neutre', 4:'😊 Positif', 5:'🤩 Excellent' };

  function setRating(val) {
    currentRating = val;
    document.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('active', i < val));
    document.getElementById('rating-label').textContent = ratingLabels[val] || '';
  }

  function toggleConfig() {
    const p = document.getElementById('config-panel');
    const a = document.getElementById('config-arrow');
    p.classList.toggle('open');
    a.textContent = p.classList.contains('open') ? '▼' : '▶';
  }

  function getToneLabel(r) {
    if (r >= 4) return { text:'✅ Ton positif', cls:'tone-positive' };
    if (r === 3) return { text:'💬 Ton neutre', cls:'tone-neutral' };
    return { text:'🤝 Ton empathique', cls:'tone-negative' };
  }

  async function generateReply() {
    const reviewText = document.getElementById('review-text').value.trim();
    const reviewerName = document.getElementById('reviewer-name').value.trim();
    const commerceName = document.getElementById('commerce-name').value.trim();
    const commerceType = document.getElementById('commerce-type').value.trim();
    const commerceCity = document.getElementById('commerce-city').value.trim();
    const tone = document.getElementById('tone-select').value;

    if (!currentRating) { showError('Sélectionne une note avant de générer.'); return; }
    hideError();
    setLoading(true);

    const context = [
      commerceName ? `Commerce : ${commerceName}` : '',
      commerceType ? `Type : ${commerceType}` : '',
      commerceCity ? `Ville : ${commerceCity}` : '',
    ].filter(Boolean).join(', ') || 'Commerce local';

    const toneMap = { chaleureux:'chaleureux et humain', professionnel:'professionnel et courtois', dynamique:'dynamique et moderne' };

    const prompt = `Tu es le responsable de ce commerce : ${context}.
Réponds à cet avis Google en français :
- Note : ${currentRating}/5 étoiles
- Auteur : ${reviewerName || 'un client'}
- Texte : "${reviewText || '(avis sans commentaire)'}"

Règles :
- Maximum 3 phrases
- Ton ${toneMap[tone]}
- ${currentRating >= 4 ? 'Remercie chaleureusement, cite un détail, invite à revenir' : currentRating === 3 ? 'Remercie, montre que tu écoutes, propose de progresser' : 'Sois empathique, ne te justifie pas, propose de résoudre en privé'}
- ${reviewerName ? `Commence par "Merci ${reviewerName},"` : 'Commence par "Merci pour votre avis,"'}
- Intègre naturellement ${commerceType || 'l\'activité'} ${commerceCity ? 'à ' + commerceCity : ''} pour le SEO local
- Ne révèle JAMAIS que tu es une IA
- Réponds directement sans guillemets`;

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Erreur serveur');
      const replyText = data.reply.trim();
      showResult(replyText);
      addToHistory(reviewerName, reviewText, replyText);
    } catch (err) {
      showError('Erreur : ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  function showResult(text) {
    document.getElementById('result-empty').style.display = 'none';
    const box = document.getElementById('result-box');
    box.classList.add('visible');
    const tone = getToneLabel(currentRating);
    const badge = document.getElementById('tone-badge');
    badge.textContent = tone.text;
    badge.className = 'tone-badge ' + tone.cls;
    document.getElementById('result-text').textContent = text;
    document.getElementById('char-count').textContent = `${text.length} caractères`;
    document.getElementById('btn-copy').textContent = '📋 Copier';
    document.getElementById('btn-copy').className = 'btn-copy';
  }

  function copyReply() {
    navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = '✅ Copié !';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copier'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function addToHistory(reviewer, review, reply) {
    sessionHistory.unshift({ rating: currentRating, reviewer, review, reply });
    if (sessionHistory.length > 5) sessionHistory.pop();
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    section.style.display = 'block';
    list.innerHTML = '';
    sessionHistory.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<div class="h-stars">${'⭐'.repeat(item.rating)}</div><div class="h-preview"><strong>${item.reviewer || 'Client'} — "${(item.review||'').substring(0,50)}…"</strong>${item.reply.substring(0,80)}…</div><button class="h-copy" onclick="copyFromHistory(${idx})">Copier</button>`;
      list.appendChild(div);
    });
  }

  function copyFromHistory(idx) { navigator.clipboard.writeText(sessionHistory[idx].reply); }
  function setLoading(on) { const b = document.getElementById('gen-btn'); b.disabled = on; b.classList.toggle('loading', on); }
  function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.style.display = 'block'; }
  function hideError() { document.getElementById('error-msg').style.display = 'none'; }

  window.onload = () => {
    document.getElementById('commerce-name').value = 'Salon Élégance';
    document.getElementById('commerce-type').value = 'salon de coiffure';
    document.getElementById('commerce-city').value = 'Paris 15e';
    toggleConfig();
  };
</script>
</body>
</html>
